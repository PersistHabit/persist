name: CD

on:
  pull_request:
    types: [closed]
    branches: [prod]

concurrency:
  group: cd-prod
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release_and_push:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'prod' &&
      github.event.pull_request.head.ref == 'dev'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout prod (full history for tagging)
        uses: actions/checkout@v4
        with:
          ref: prod
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [ -z "$VERSION" ]; then
            echo "No version found in package.json" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "git_tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fail if git tag already exists
        run: |
          TAG="${{ steps.version.outputs.git_tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Bump package.json version first." >&2
            exit 1
          fi

      - name: Create and push git tag
        run: |
          TAG="${{ steps.version.outputs.git_tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Compute GHCR image name (lowercase)
        id: img
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          echo "image=${IMAGE,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:${{ steps.version.outputs.version }}
            ${{ steps.img.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max