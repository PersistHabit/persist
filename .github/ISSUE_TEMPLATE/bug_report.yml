name: 🐛 Bug report
description: Signaler un bug reproductible
title: "[BUG] "
labels: ["bug"]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Que se passe-t-il exactement ?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur ...
        2. Cliquer sur ...
        3. Voir l’erreur
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: Ce qui aurait dû se produire
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environnement
      options:
        - dev
        - prod
        - autre
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / captures
      description: Logs, stacktrace, screenshots si utiles